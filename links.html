<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shalom — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: 'Jost', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #04111f;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(36px,8vh,64px) 18px clamp(40px,8vh,64px);
  min-height: 100vh;
}

/* gradiente de fundo */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 45% at 50% -5%, rgba(43,179,232,.18), transparent 65%),
    radial-gradient(ellipse 55% 35% at 90% 100%, rgba(20,90,160,.15), transparent 65%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── cabeçalho ── */
.logo-wrap {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 36px rgba(43,179,232,.26), 0 2px 10px rgba(0,0,0,.3);
  margin-bottom: 16px;
  overflow: hidden;
  flex-shrink: 0;
}
.logo-wrap img { width: 64%; height: 64%; object-fit: contain; }

.church-name {
  font-weight: 500;
  font-size: 20px;
  letter-spacing: -.01em;
  text-align: center;
}
.church-slogan {
  margin-top: 5px;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
  text-align: center;
}

/* ── redes sociais ── */
.social-row {
  display: flex;
  gap: 12px;
  margin-top: 18px;
  margin-bottom: 28px;
}
.social-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  text-decoration: none;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.13);
  transition: transform .22s, border-color .22s, background .22s;
}
.social-icon:hover {
  transform: translateY(-3px);
  border-color: rgba(43,179,232,.5);
  background: rgba(43,179,232,.12);
}
.social-icon svg { width: 18px; height: 18px; fill: #fff; }

/* ── bio text ── */
.bio {
  font-weight: 300;
  font-size: 14px;
  line-height: 1.65;
  color: rgba(255,255,255,.72);
  text-align: center;
  margin-bottom: 28px;
  padding: 0 4px;
}
.bio strong { color: #fff; font-weight: 500; }

/* ── cards ── */
.cards { width: 100%; display: flex; flex-direction: column; gap: 14px; }

.card {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  background: #071e36;
  border: 1px solid rgba(255,255,255,.09);
  display: flex;
  align-items: stretch;
  min-height: 120px;
  text-decoration: none;
  color: #fff;
  position: relative;
  transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s, border-color .25s;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 40px rgba(43,179,232,.18);
  border-color: rgba(43,179,232,.35);
}

/* lado esquerdo — texto */
.card-body {
  flex: 1;
  padding: 20px 18px 20px 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 10px;
  min-width: 0;
}
.card-title {
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .04em;
  text-transform: uppercase;
  line-height: 1.2;
}
.card-desc {
  font-weight: 300;
  font-size: 12px;
  line-height: 1.6;
  color: rgba(255,255,255,.68);
  flex: 1;
}
.card-cta {
  display: inline-block;
  margin-top: 4px;
  padding: 8px 18px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.38);
  color: #fff;
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .16em;
  text-transform: uppercase;
  border-radius: 4px;
  align-self: flex-start;
  transition: background .22s, border-color .22s;
  cursor: pointer;
}
.card:hover .card-cta {
  background: rgba(43,179,232,.18);
  border-color: #2bb3e8;
}

/* lado direito — imagem */
.card-img {
  width: 130px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.card-img img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 1s cubic-bezier(.2,.7,.2,1);
}
.card:hover .card-img img { transform: scale(1.06); }
.card-img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #071e36 0%, transparent 40%);
}

/* card sem imagem (link simples) */
.card.simple {
  min-height: 64px;
  align-items: center;
}
.card.simple .card-body {
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 20px;
}
.card.simple .card-title {
  font-size: 14px;
  font-weight: 500;
  text-transform: none;
  letter-spacing: .02em;
}
.card.simple .card-arrow {
  color: rgba(255,255,255,.4);
  font-size: 18px;
  flex-shrink: 0;
  transition: color .22s, transform .22s;
}
.card:hover.simple .card-arrow {
  color: #2bb3e8;
  transform: translateX(4px);
}

/* ── footer ── */
.footer-credit {
  margin-top: 40px;
  font-weight: 300;
  font-size: 12px;
  color: rgba(255,255,255,.25);
  letter-spacing: .06em;
  text-align: center;
}
</style>
</head>
<body>
<div class="container">

  <!-- CABEÇALHO -->
  <div class="logo-wrap">
    <img src="assets/logo.png" alt="Shalom">
  </div>
  <div class="church-name">Comunidade Batista Shalom</div>
  <div class="church-slogan">Uma Igreja Restaurando Vidas</div>

  <!-- REDES SOCIAIS -->
  <div class="social-row">
    <a class="social-icon" id="link-ig" href="#" target="_blank" title="Instagram">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    </a>
    <a class="social-icon" id="link-yt" href="#" target="_blank" title="YouTube">
      <svg viewBox="0 0 24 24"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
    </a>
    <a class="social-icon" id="link-wa" href="#" target="_blank" title="WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
    </a>
  </div>

  <!-- BIO -->
  <p class="bio" id="bio-text">
    Somos uma <strong>comunidade batista</strong> em Umuarama/PR, há mais de 12 anos anunciando o evangelho de forma simples, acolhedora e real.
  </p>

  <!-- CARDS -->
  <div class="cards" id="cards-list"></div>

  <div class="footer-credit">© <span id="ano"></span> Comunidade Batista Shalom · Umuarama/PR</div>
</div>

<script>
/* ═══════════════════════════════════════
   PAINEL — edite para atualizar os cards
   ═══════════════════════════════════════ */
const PAINEL = {
  social: {
    instagram: 'https://instagram.com/',
    youtube:   'https://youtube.com/',
    whatsapp:  'https://wa.me/5544999990000',
  },

  bio: 'Somos uma <strong>comunidade batista</strong> em Umuarama/PR, há mais de 12 anos anunciando o evangelho de forma simples, acolhedora e real.',

  /* tipo: 'card' (com imagem) ou 'simple' (linha simples) */
  links: [
    {
      tipo:  'card',
      titulo: 'Cultos Presenciais',
      desc:   'Venha nos visitar! Domingos às 9h, 18h e 20h na Sede Umuarama. Você é bem-vindo.',
      cta:    'Saiba mais',
      img:    'assets/culto-duotone.jpg',
      url:    'index.html',
    },
    {
      tipo:  'card',
      titulo: 'Faça Parte de uma Célula',
      desc:   'Encontre um grupo perto de você e cresça na fé junto com outros.',
      cta:    'Saiba mais',
      img:    'assets/culto-band.jpg',
      url:    'index.html',
    },
    {
      tipo:  'simple',
      titulo: 'Dízimos e Ofertas',
      url:    'index.html',
    },
    {
      tipo:  'simple',
      titulo: 'Assista ao Culto Online',
      url:    'https://youtube.com/',
    },
    {
      tipo:  'simple',
      titulo: 'Fale Conosco pelo WhatsApp',
      url:    'https://wa.me/5544999990000',
    },
  ],
};

/* social */
document.getElementById('link-ig').href = PAINEL.social.instagram;
document.getElementById('link-yt').href = PAINEL.social.youtube;
document.getElementById('link-wa').href = PAINEL.social.whatsapp;
document.getElementById('bio-text').innerHTML = PAINEL.bio;

/* cards */
const list = document.getElementById('cards-list');
list.innerHTML = PAINEL.links.map(l => {
  const target = l.url.startsWith('http') ? 'target="_blank"' : '';
  if (l.tipo === 'card') {
    return `
      <a class="card" href="${l.url}" ${target}>
        <div class="card-body">
          <div>
            <div class="card-title">${l.titulo}</div>
            <div class="card-desc" style="margin-top:8px;">${l.desc}</div>
          </div>
          <span class="card-cta">${l.cta}</span>
        </div>
        <div class="card-img">
          <img src="${l.img}" alt="${l.titulo}">
          <div class="card-img-overlay"></div>
        </div>
      </a>`;
  }
  return `
    <a class="card simple" href="${l.url}" ${target}>
      <div class="card-body">
        <div class="card-title">${l.titulo}</div>
        <span class="card-arrow">&#8594;</span>
      </div>
    </a>`;
}).join('');

document.getElementById('ano').textContent = new Date().getFullYear();
</script>
</body>
</html>
